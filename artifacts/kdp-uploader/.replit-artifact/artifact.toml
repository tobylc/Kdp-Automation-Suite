kind = "web"
previewPath = "/"
title = "KDP Upload Automation"
version = "1.0.0"
id = "artifacts/kdp-uploader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18388

[services.development]
run = "pnpm --filter @workspace/kdp-uploader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kdp-uploader", "run", "build" ]
publicDir = "artifacts/kdp-uploader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18388"
BASE_PATH = "/"
