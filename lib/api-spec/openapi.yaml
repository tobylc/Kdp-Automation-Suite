openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KDP Book Upload Automation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: books
    description: Book title management
  - name: jobs
    description: Upload job management
  - name: schedule
    description: Cron schedule configuration
  - name: stats
    description: Dashboard statistics
  - name: setup
    description: Local workspace setup
  - name: settings
    description: Application settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List all discovered books
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"

  /books/scan:
    post:
      operationId: scanForBooks
      tags: [books]
      summary: Trigger a scan for new book titles
      description: Scrapes scripturemadesimple.replit.app/my-studies and downloads assets for any new titles
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  /books/bookshelf-scan:
    post:
      operationId: scanKdpBookshelf
      tags: [books]
      summary: Scan Amazon KDP bookshelf and sync live statuses
      description: >
        Navigates the KDP bookshelf using a Playwright browser, reads the live/pending/draft
        status of every title across all paginated pages, and updates the database so the
        automation knows which books are already live and should not be re-uploaded.
      responses:
        "200":
          description: Bookshelf scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookshelfScanResult"
        "500":
          description: Scan failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a single book with its upload jobs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all upload jobs
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, running, completed, failed]
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [ebook, paperback, hardcover]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadJob"

  /jobs/run-all:
    post:
      operationId: runAllJobs
      tags: [jobs]
      summary: Queue and run all pending jobs
      responses:
        "200":
          description: Jobs queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAllResult"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a single job with full logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadJobDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/run:
    post:
      operationId: runJob
      tags: [jobs]
      summary: Run or re-run a specific upload job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/ai-provider:
    get:
      operationId: getAiProviderConfig
      tags: [settings]
      summary: Get current AI provider configuration
      responses:
        "200":
          description: AI provider config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProviderConfig"
    put:
      operationId: updateAiProviderConfig
      tags: [settings]
      summary: Update AI provider configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiProviderInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProviderConfig"

  /settings/ai-provider/test:
    post:
      operationId: testAiProviderConnection
      tags: [settings]
      summary: Test the configured AI provider connection
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProviderTestResult"

  /schedule:
    get:
      operationId: getSchedule
      tags: [schedule]
      summary: Get current cron schedule configuration
      responses:
        "200":
          description: Schedule config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleConfig"
    patch:
      operationId: updateSchedule
      tags: [schedule]
      summary: Update cron schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleConfig"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Dashboard summary statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /setup/status:
    get:
      operationId: getSetupStatus
      tags: [setup]
      summary: Get local workspace setup status
      description: Returns whether Chrome CDP is available, which tabs are open, and whether KDP is logged in. Only meaningful when CDP_ENDPOINT is set.
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /setup/prepare:
    post:
      operationId: prepareWorkspace
      tags: [setup]
      summary: Prepare the local workspace
      description: Launches Chrome if not running, opens KDP Bookshelf and Study Guides tabs if not already open, and returns a step-by-step result.
      responses:
        "200":
          description: Preparation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupResult"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Book:
      type: object
      required: [id, title, discoveredAt, status, ebookStatus, paperbackStatus, hardcoverStatus]
      properties:
        id:
          type: integer
        title:
          type: string
        sourceUrl:
          type: ["string", "null"]
        manuscriptUrl:
          type: ["string", "null"]
        coverJpgUrl:
          type: ["string", "null"]
        coverPngUrl:
          type: ["string", "null"]
        kdpContentUrl:
          type: ["string", "null"]
        discoveredAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [discovered, downloading, ready, uploading, completed, failed, live, partial]
        ebookStatus:
          type: ["string", "null"]
          enum: [pending, running, completed, failed, null]
        paperbackStatus:
          type: ["string", "null"]
          enum: [pending, running, completed, failed, null]
        hardcoverStatus:
          type: ["string", "null"]
          enum: [pending, running, completed, failed, null]
        ebookKdpStatus:
          type: ["string", "null"]
          description: Live KDP bookshelf status for the eBook format
        paperbackKdpStatus:
          type: ["string", "null"]
          description: Live KDP bookshelf status for the Paperback format
        hardcoverKdpStatus:
          type: ["string", "null"]
          description: Live KDP bookshelf status for the Hardcover format
        lastBookshelfScanAt:
          type: ["string", "null"]
          format: date-time
          description: When this book was last seen on the KDP bookshelf

    BookDetail:
      type: object
      required: [id, title, discoveredAt, status, jobs]
      properties:
        id:
          type: integer
        title:
          type: string
        sourceUrl:
          type: ["string", "null"]
        manuscriptUrl:
          type: ["string", "null"]
        coverJpgUrl:
          type: ["string", "null"]
        coverPngUrl:
          type: ["string", "null"]
        kdpContentUrl:
          type: ["string", "null"]
        kdpContent:
          type: ["string", "null"]
        discoveredAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [discovered, downloading, ready, uploading, completed, failed, live, partial]
        ebookKdpStatus:
          type: ["string", "null"]
        paperbackKdpStatus:
          type: ["string", "null"]
        hardcoverKdpStatus:
          type: ["string", "null"]
        lastBookshelfScanAt:
          type: ["string", "null"]
          format: date-time
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/UploadJobDetail"

    UploadJob:
      type: object
      required: [id, bookId, bookTitle, format, status, createdAt]
      properties:
        id:
          type: integer
        bookId:
          type: integer
        bookTitle:
          type: string
        format:
          type: string
          enum: [ebook, paperback, hardcover]
        status:
          type: string
          enum: [pending, running, completed, failed]
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        errorMessage:
          type: ["string", "null"]
        lastScreenshotUrl:
          type: ["string", "null"]

    UploadJobDetail:
      type: object
      required: [id, bookId, bookTitle, format, status, createdAt, logs]
      properties:
        id:
          type: integer
        bookId:
          type: integer
        bookTitle:
          type: string
        format:
          type: string
          enum: [ebook, paperback, hardcover]
        status:
          type: string
          enum: [pending, running, completed, failed]
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        errorMessage:
          type: ["string", "null"]
        lastScreenshotUrl:
          type: ["string", "null"]
        logs:
          type: array
          items:
            $ref: "#/components/schemas/JobLog"

    JobLog:
      type: object
      required: [id, jobId, level, message, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        level:
          type: string
          enum: [info, warn, error, success]
        message:
          type: string
        screenshotUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ScanResult:
      type: object
      required: [newBooks, totalFound, message]
      properties:
        newBooks:
          type: integer
        totalFound:
          type: integer
        message:
          type: string

    BookshelfScanResult:
      type: object
      required: [scanned, updated, message]
      properties:
        scanned:
          type: integer
          description: Number of KDP title entries found across all bookshelf pages
        updated:
          type: integer
          description: Number of books in the DB whose KDP status was updated
        message:
          type: string

    RunAllResult:
      type: object
      required: [queued, message]
      properties:
        queued:
          type: integer
        message:
          type: string

    AiProviderConfig:
      type: object
      required: [id, provider, model, hasApiKey, smartRoutingEnabled, updatedAt]
      properties:
        id:
          type: integer
        provider:
          type: string
          enum: [anthropic, openai, openrouter]
        model:
          type: string
        hasApiKey:
          type: boolean
          description: True if an API key is stored (key value is never returned)
        baseUrl:
          type: ["string", "null"]
        smartRoutingEnabled:
          type: boolean
          description: When true, tries primary model first then escalates to fallback on failure or uncertainty
        fallbackProvider:
          type: ["string", "null"]
          enum: [anthropic, openai, openrouter, "null"]
        fallbackModel:
          type: ["string", "null"]
        hasFallbackApiKey:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    AiProviderInput:
      type: object
      required: [provider, model]
      properties:
        provider:
          type: string
          enum: [anthropic, openai, openrouter]
        model:
          type: string
        apiKey:
          type: ["string", "null"]
          description: API key — omit to keep existing key unchanged
        baseUrl:
          type: ["string", "null"]
        smartRoutingEnabled:
          type: boolean
        fallbackProvider:
          type: ["string", "null"]
        fallbackModel:
          type: ["string", "null"]
        fallbackApiKey:
          type: ["string", "null"]
          description: Fallback API key — omit to keep existing unchanged

    AiProviderTestResult:
      type: object
      required: [success, message, model]
      properties:
        success:
          type: boolean
        message:
          type: string
        model:
          type: string
        fallbackResult:
          type: object
          properties:
            success:
              type: boolean
            message:
              type: string
            model:
              type: string

    ScheduleConfig:
      type: object
      required: [id, cronExpression, enabled, createdAt]
      properties:
        id:
          type: integer
        cronExpression:
          type: string
        enabled:
          type: boolean
        lastRunAt:
          type: ["string", "null"]
          format: date-time
        nextRunAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    ScheduleInput:
      type: object
      properties:
        cronExpression:
          type: string
        enabled:
          type: boolean

    DashboardStats:
      type: object
      required: [totalBooks, booksReady, booksCompleted, booksFailed, booksLiveOnKdp, totalJobs, jobsPending, jobsRunning, jobsCompleted, jobsFailed, lastScanAt, lastBookshelfScanAt]
      properties:
        totalBooks:
          type: integer
        booksReady:
          type: integer
        booksCompleted:
          type: integer
        booksFailed:
          type: integer
        booksLiveOnKdp:
          type: integer
          description: Books confirmed fully live on KDP (all 3 formats live)
        totalJobs:
          type: integer
        jobsPending:
          type: integer
        jobsRunning:
          type: integer
        jobsCompleted:
          type: integer
        jobsFailed:
          type: integer
        lastScanAt:
          type: ["string", "null"]
          format: date-time
        lastBookshelfScanAt:
          type: ["string", "null"]
          format: date-time
          description: When the KDP bookshelf was last scanned

    SetupStatus:
      type: object
      required: [localMode, chromeCdpAvailable, kdpTabOpen, kdpLoggedIn, studyGuidesTabOpen, isReady]
      properties:
        localMode:
          type: boolean
          description: True when CDP_ENDPOINT is configured (running locally)
        chromeCdpAvailable:
          type: boolean
          description: Chrome is running with --remote-debugging-port
        kdpTabOpen:
          type: boolean
          description: A KDP Bookshelf tab is open in Chrome
        kdpLoggedIn:
          type: boolean
          description: The KDP tab appears to be logged in (not on a sign-in page)
        studyGuidesTabOpen:
          type: boolean
          description: The My Study Guides tab is open in Chrome
        isReady:
          type: boolean
          description: All prerequisites are met — uploads can proceed
        cdpEndpoint:
          type: ["string", "null"]
          description: The configured CDP endpoint URL

    SetupStep:
      type: object
      required: [name, status, message]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ok, error, skipped]
        message:
          type: string

    SetupResult:
      type: object
      required: [steps, isReady, message]
      properties:
        steps:
          type: array
          items:
            $ref: "#/components/schemas/SetupStep"
        isReady:
          type: boolean
        message:
          type: string
